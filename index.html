<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spreadsheet Habit Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h2>Welcome to Habit Tracker</h2>
            <p>Please sign in to save your habits and level up!</p>
            <button id="googleSignInBtn" class="btn google-btn">
                <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2045c0-.6381-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.2581h2.9086c1.7018-1.5668 2.6836-3.874 2.6836-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.4673-.806 5.9564-2.1805l-2.9086-2.2581c-.8059.54-1.8368.859-3.0477.859-2.344 0-4.3282-1.5831-5.036-3.7104H.9574v2.3318C2.4382 15.9832 5.4818 18 9 18z" fill="#34A853"/><path d="M3.964 10.71c-.18-.54-.2822-1.1168-.2822-1.71s.1023-1.17.2822-1.71V4.9582H.9574C.3477 6.1732 0 7.5477 0 9s.3477 2.8268.9574 4.0418L3.964 10.71z" fill="#FBBC05"/><path d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4632.8918 11.426 0 9 0 5.4818 0 2.4382 2.0168.9574 4.9582L3.964 7.29C4.6718 5.1627 6.656 3.5795 9 3.5795z" fill="#EA4335"/></svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="appContainer" style="display: none;">
        <div class="header-banner">
            <h1>Pov: i literally turned my life into a game</h1>
        </div>

        <!-- SPREADSHEET MOCKUP FRAME -->
        <div class="spreadsheet-container">
            <div class="spreadsheet" id="spreadsheet">
                <!-- Rendered via JS -->
            </div>
        </div>
        
        <!-- GAMIFICATION & ADD HABIT -->
        <div class="toolbar">
            <button id="addHabitBtn" class="btn">+ Add Habit</button>
            <button id="resetBtn" class="btn btn-outline">↻ Reset</button>
            <button id="logoutBtn" class="btn btn-outline" style="margin-left: auto;">Sign Out</button>
        </div>

        <div class="stats-cards">
            <div class="card">
                <div class="card-title">🔥 Overall Streak</div>
                <div class="card-value" id="streakCount">0</div>
            </div>
            <div class="card">
                <div class="card-title">🏆 Level</div>
                <div class="card-value" id="levelDisplay">Lv. 1</div>
            </div>
            <div class="card">
                <div class="card-title">⭐ XP Score</div>
                <div class="card-value" id="xpScore">0</div>
            </div>
        </div>

        <!-- CHARTS -->
        <div class="charts-container">
            <div class="chart-box">
                <h3>Completion Rate</h3>
                <div style="height: 200px;">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
            <div class="chart-box">
                <h3>Habit Performance</h3>
                <div style="height: 200px;">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
