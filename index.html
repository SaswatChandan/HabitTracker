<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track It. Stick To It. Become It.</title>
    <meta name="description" content="A premium habit tracker with gamification, streaks, heatmaps, and cloud sync.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%234F46E5'/><stop offset='100%25' stop-color='%23EC4899'/></linearGradient></defs><path d='M50 15 L85 35 L85 70 L50 90 L15 70 L15 35 Z' fill='none' stroke='url(%23g)' stroke-width='6'/><path d='M50 35 L75 50 L50 65 L25 50 Z' fill='url(%23g)' opacity='0.8'/><path d='M50 65 L50 90 M25 50 L15 70 M75 50 L85 70' stroke='url(%23g)' stroke-width='4' opacity='0.6'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- GLOBAL THEME TOGGLE -->
    <header class="global-header">
        <button id="themeToggleBtn" class="theme-btn">☀️ Light Mode</button>
    </header>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="login-logo">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="60" height="60">
                    <defs>
                        <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#4F46E5"/>
                            <stop offset="100%" stop-color="#EC4899"/>
                        </linearGradient>
                    </defs>
                    <path d="M50 15 L85 35 L85 70 L50 90 L15 70 L15 35 Z" fill="none" stroke="url(#lg)" stroke-width="6"/>
                    <path d="M50 35 L75 50 L50 65 L25 50 Z" fill="url(#lg)" opacity="0.8"/>
                </svg>
            </div>
            <h2>Track It. Stick To It.</h2>
            <p>Sign in to sync your habits across all devices and start leveling up!</p>
            <button id="googleSignInBtn" class="btn google-btn">
                <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.64 9.2045c0-.6381-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.2581h2.9086c1.7018-1.5668 2.6836-3.874 2.6836-6.615z" fill="#4285F4" />
                    <path d="M9 18c2.43 0 4.4673-.806 5.9564-2.1805l-2.9086-2.2581c-.8059.54-1.8368.859-3.0477.859-2.344 0-4.3282-1.5831-5.036-3.7104H.9574v2.3318C2.4382 15.9832 5.4818 18 9 18z" fill="#34A853" />
                    <path d="M3.964 10.71c-.18-.54-.2822-1.1168-.2822-1.71s.1023-1.17.2822-1.71V4.9582H.9574C.3477 6.1732 0 7.5477 0 9s.3477 2.8268.9574 4.0418L3.964 10.71z" fill="#FBBC05" />
                    <path d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4632.8918 11.426 0 9 0 5.4818 0 2.4382 2.0168.9574 4.9582L3.964 7.29C4.6718 5.1627 6.656 3.5795 9 3.5795z" fill="#EA4335" />
                </svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="appContainer" style="display: none;">
        <div class="header-banner">
            <div class="logo-container">
                <svg class="app-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#4F46E5"/>
                            <stop offset="100%" stop-color="#EC4899"/>
                        </linearGradient>
                        <filter id="neon">
                            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                    </defs>
                    <path d="M50 15 L85 35 L85 70 L50 90 L15 70 L15 35 Z" fill="none" stroke="url(#glow)" stroke-width="6" filter="url(#neon)"/>
                    <path d="M50 35 L75 50 L50 65 L25 50 Z" fill="url(#glow)" opacity="0.8"/>
                    <path d="M50 65 L50 90 M25 50 L15 70 M75 50 L85 70" stroke="url(#glow)" stroke-width="4" opacity="0.6"/>
                </svg>
                <h1 class="glow-text">Track It. Stick To It. Become It.</h1>
            </div>
        </div>

        <!-- SPREADSHEET -->
        <div class="spreadsheet-container">
            <div class="spreadsheet" id="spreadsheet"></div>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <button id="addHabitBtn" class="btn">+ Add Habit</button>
            <button id="notifBtn" class="btn btn-outline">🔔 Reminders</button>
            <button id="downloadCsvBtn" class="btn btn-outline">📥 CSV</button>
            <button id="printReportBtn" class="btn btn-outline">🖨️ Report</button>
            <button id="resetBtn" class="btn btn-outline">↻ Reset</button>
            <button id="logoutBtn" class="btn btn-outline" style="margin-left: auto;">Sign Out</button>
        </div>

        <!-- STATS CARDS -->
        <div class="stats-cards">
            <div class="card" id="card-streak">
                <div class="card-title">🔥 Overall Streak</div>
                <div class="card-value" id="streakCount">0</div>
            </div>
            <div class="card" id="card-level">
                <div class="card-title">🏆 Level</div>
                <div class="card-value" id="levelDisplay">Lv. 1</div>
            </div>
            <div class="card" id="card-xp">
                <div class="card-title">⭐ XP Score</div>
                <div class="card-value" id="xpScore">0</div>
            </div>
        </div>

        <!-- BADGES SECTION -->
        <div class="section-card" id="badgesSection">
            <h3 class="section-title">🏅 Achievements</h3>
            <div class="badges-shelf" id="badgesShelf"></div>
        </div>

        <!-- HEATMAP SECTION -->
        <div class="section-card" id="heatmapSection">
            <h3 class="section-title">🔥 Year in Review</h3>
            <div class="heatmap-scroll">
                <div class="heatmap-grid" id="heatmapGrid"></div>
            </div>
            <div class="heatmap-legend">
                <span>Less</span>
                <div class="legend-box" style="background:rgba(139,92,246,0.1)"></div>
                <div class="legend-box" style="background:rgba(139,92,246,0.3)"></div>
                <div class="legend-box" style="background:rgba(139,92,246,0.55)"></div>
                <div class="legend-box" style="background:rgba(236,72,153,0.8)"></div>
                <div class="legend-box" style="background:linear-gradient(135deg,#4f46e5,#ec4899)"></div>
                <span>More</span>
            </div>
        </div>

        <!-- CHARTS -->
        <div class="charts-container">
            <div class="chart-box">
                <h3>Completion Rate</h3>
                <div style="height: 200px;"><canvas id="pieChart"></canvas></div>
            </div>
            <div class="chart-box">
                <h3>Habit Performance</h3>
                <div style="height: 200px;"><canvas id="barChart"></canvas></div>
            </div>
        </div>
    </div>

    <!-- NOTE MODAL -->
    <div id="noteModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3>📝 Add a Note</h3>
            <p id="noteModalLabel" class="modal-label"></p>
            <textarea id="noteInput" class="note-textarea" placeholder="e.g. Personal record today! 💪" rows="3"></textarea>
            <div class="modal-actions">
                <button id="saveNoteBtn" class="btn">Save Note</button>
                <button id="cancelNoteBtn" class="btn btn-outline">Cancel</button>
            </div>
        </div>
    </div>

    <!-- MILESTONE TOAST -->
    <div id="milestoneToast" class="milestone-toast" style="display:none;"></div>

    <!-- CONFETTI CANVAS -->
    <canvas id="confettiCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;"></canvas>

    <script type="module" src="app.js"></script>
</body>
</html>
